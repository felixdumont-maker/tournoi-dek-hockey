version: "3.8"
services:
  api:
    build: ./api
    container_name: tournoi-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./api:/app
    networks:
      - tournoi-net
      - private_net
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    container_name: tournoi-redis
    restart: unless-stopped
    networks:
      - tournoi-net
  nginx:
    image: nginx:alpine
    container_name: tournoi-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - tournoi-net
networks:
  tournoi-net:
    driver: bridge
  private_net:
    external: true
